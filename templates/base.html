<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mamba-GNN 网约车需求预测系统</title>

    <script src="{{ url_for('static', filename='tailwindcss.js') }}"></script>
    <script src="{{ url_for('static', filename='chart.js') }}"></script>

    <!-- ======================================================== -->
    <!-- 核心機制 1：基於角色的防閃爍路由守衛 (RBAC Guard) -->
    <!-- ======================================================== -->
    <style id="anti-flash-style">
        /* 頁面在通過驗證前保持隱身，徹底解決閃爍問題 */
        html { background-color: #050b14; }
        body { opacity: 0; visibility: hidden; transition: opacity 0.3s ease; }
    </style>

    <script>
        (function() {
            const currentPath = window.location.pathname;

            // 嘗試獲取並解析用戶 Token
            let currentUser = null;
            let tokenStr = localStorage.getItem('mamba_auth_token') || sessionStorage.getItem('mamba_auth_token');

            if (tokenStr) {
                try { currentUser = JSON.parse(tokenStr); } catch(e) {}
            }

            const role = currentUser ? currentUser.role : 'guest';

            // 定義頁面權限矩陣
            const routePermissions = {
                '/': ['admin', 'super', 'normal', 'guest'],
                '/login': ['admin', 'super', 'normal', 'guest'],
                '/dashboard': ['admin', 'super', 'normal'],
                '/system': ['admin', 'super'],
                '/analytics': ['admin'],
                '/contrast': ['admin'],
                '/users': ['admin'],
                '/doc': ['admin', 'super', 'normal', 'guest'],
                '/about': ['admin', 'super', 'normal', 'guest']
            };

            // 權限校驗與攔截重定向
            if (routePermissions[currentPath]) {
                if (!routePermissions[currentPath].includes(role)) {
                    if (role === 'guest') {
                        window.location.replace('/login');
                    } else {
                        window.location.replace('/dashboard');
                    }
                    return;
                }
            }

            // 【驗證通過】：解除隱身狀態，並在 DOM 加載後渲染導航欄
            window.addEventListener('DOMContentLoaded', () => {
                const styleTag = document.getElementById('anti-flash-style');
                if (styleTag) styleTag.remove();
                document.body.style.opacity = '1';
                document.body.style.visibility = 'visible';

                // 動態控制導航欄選單的顯示/隱藏
                document.querySelectorAll('.nav-item').forEach(item => {
                    const reqRole = item.getAttribute('data-req-role');
                    if (reqRole === 'admin' && role !== 'admin') item.style.display = 'none';
                    if (reqRole === 'super' && role !== 'admin' && role !== 'super') item.style.display = 'none';
                    if (reqRole === 'normal' && role === 'guest') item.style.display = 'none';
                });
            });
        })();
    </script>

    <style>
        :root {
            --font-main: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --font-tech: "Segoe UI Mono", "Roboto Mono", monospace;
            --primary-bg: #050b14;
            --panel-bg: rgba(16, 23, 42, 0.6);
            --border-color: rgba(148, 163, 184, 0.1);
        }

        body {
            font-family: var(--font-main);
            background-color: var(--primary-bg);
            color: #cbd5e1;
            background-image: radial-gradient(circle at 50% 0%, #172033 0%, #050b14 80%);
        }

        .tech-font { font-family: var(--font-tech); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .nav-link { transition: all 0.3s; border-bottom: 2px solid transparent; }
        .nav-link:hover, .nav-link.active { color: #22d3ee; border-bottom-color: #22d3ee; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">
<nav class="border-b border-white/5 bg-[#0F172A]/80 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
        <!-- Logo -->
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-lg flex items-center justify-center">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            </div>
            <a href="/" class="text-2xl font-bold tracking-widest tech-font text-white hover:opacity-80 transition">MAMBA<span class="text-cyan-400">GNN</span></a>
        </div>

        <!-- 導航區域 -->
        <div class="flex items-center gap-8">
            <div class="hidden md:flex gap-6 tech-font text-sm">
                <a href="/" class="nav-link py-2 {{ 'active' if request.path == '/' }}">首页</a>
                <a href="/system" data-req-role="super" class="nav-item nav-link py-2 {{ 'active' if request.path == '/system' }}">系统架构</a>
                <a href="/dashboard" data-req-role="normal" class="nav-item nav-link py-2 {{ 'active' if request.path == '/dashboard' }}">展示台</a>
                <a href="/analytics" data-req-role="admin" class="nav-item nav-link py-2 {{ 'active' if request.path == '/analytics' }}">消融实验</a>
                <a href="/contrast" data-req-role="admin" class="nav-item nav-link py-2 {{ 'active' if request.path == '/contrast' }}">对比实验</a>
                <a href="/users" data-req-role="admin" class="nav-item nav-link py-2 {{ 'active' if request.path == '/users' }}">用户管理</a>
            </div>

            <div class="flex items-center gap-3">
                <!-- 仅在 展示台、消融实验、对比实验 页面显示时间范围切换下拉框 -->
                {% if request.path in ['/dashboard', '/analytics', '/contrast'] %}
                <select id="dataset-selector" class="bg-slate-900/80 border border-cyan-500/50 text-cyan-400 text-xs rounded-md px-2 py-2 focus:outline-none focus:border-cyan-400 hover:bg-slate-800 transition shadow-[0_0_10px_rgba(34,211,238,0.1)] cursor-pointer">
                    <option value="results">7月1日 - 7月7日 (短周期)</option>
                    <option value="results2">6月10日 - 7月7日 (长周期)</option>
                </select>
                {% endif %}

                <div id="user-role-badge" class="hidden px-3 py-1 rounded border text-xs font-mono"></div>
                <a href="/login" id="nav-login-btn" class="px-5 py-2 rounded-lg border border-cyan-500/50 text-cyan-400 hover:bg-cyan-400 hover:text-slate-900 transition text-sm font-bold tech-font tracking-widest">登录系统</a>
            </div>
        </div>
    </div>
</nav>

<main class="flex-1 max-w-7xl mx-auto px-6 py-8 w-full">
    {% block content %}{% endblock %}
</main>

<footer class="border-t border-white/5 bg-[#020617] relative overflow-hidden mt-10">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-2/3 h-[1px] bg-gradient-to-r from-transparent via-cyan-500/50 to-transparent"></div>

    <div class="max-w-7xl mx-auto px-6 pt-10 pb-2">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-center">
            <div>
                <h4 class="text-white font-bold tech-font tracking-widest text-lg flex items-center gap-2">
                    <div class="w-2 h-2 bg-cyan-500 rounded-full animate-pulse"></div>
                    MAMBA INTELLIGENCE
                </h4>
            </div>

            <div class="flex justify-center gap-8 border-x border-white/5 px-4">
                <div class="text-center">
                    <div class="text-xs text-slate-500 font-mono uppercase mb-1 tracking-wider">CUDA版本</div>
                    <div class="text-cyan-400 font-bold font-mono text-xm">12.8</div>
                </div>
                <div class="text-center">
                    <div class="text-xs text-slate-500 font-mono uppercase mb-1 tracking-wider">Mamba版本</div>
                    <div class="text-emerald-400 font-bold font-mono text-xm">2.2.2</div>
                </div>
                <div class="text-center">
                    <div class="text-xs text-slate-500 font-mono uppercase mb-1 tracking-wider">GNN类别</div>
                    <div class="text-purple-400 font-bold font-mono text-xm">GCN</div>
                </div>
            </div>

            <div class="text-right">
                <p class="text-slate-600 text-xs font-mono mb-3">
                    &copy; 2026 INTELLIGENT TRAFFIC LAB. <br>
                    ALL RIGHTS RESERVED.
                </p>
                <div class="flex justify-end gap-6">
                    <a href="/doc" class="text-slate-500 hover:text-cyan-400 text-xs transition border-b border-transparent hover:border-cyan-400/50 pb-0.5">使用文档</a>
                    <a href="/about" class="text-slate-500 hover:text-cyan-400 text-xs transition border-b border-transparent hover:border-cyan-400/50 pb-0.5">关于我们</a>
                </div>
            </div>
        </div>
    </div>
</footer>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        let tokenStr = localStorage.getItem('mamba_auth_token') || sessionStorage.getItem('mamba_auth_token');
        const loginBtn = document.getElementById('nav-login-btn');
        const roleBadge = document.getElementById('user-role-badge');

        if (loginBtn && tokenStr) {
            try {
                const user = JSON.parse(tokenStr);
                roleBadge.style.display = 'block';
                if(user.role === 'admin') {
                    roleBadge.className = 'px-3 py-1 rounded bg-red-500/20 border border-red-500/50 text-red-400 text-xs font-mono font-bold';
                    roleBadge.innerText = '管理员 (ADMIN)';
                } else if(user.role === 'super') {
                    roleBadge.className = 'px-3 py-1 rounded bg-purple-500/20 border border-purple-500/50 text-purple-400 text-xs font-mono font-bold';
                    roleBadge.innerText = '高级会员 (SUPER)';
                } else {
                    roleBadge.className = 'px-3 py-1 rounded bg-blue-500/20 border border-blue-500/50 text-blue-400 text-xs font-mono font-bold';
                    roleBadge.innerText = '普通用户';
                }

                loginBtn.innerText = '退出系统';
                loginBtn.classList.remove('border-cyan-500/50', 'text-cyan-400');
                loginBtn.classList.add('border-slate-500/50', 'text-slate-400', 'hover:bg-red-500', 'hover:text-white');
                loginBtn.href = '#';
                loginBtn.onclick = function(e) {
                    e.preventDefault();
                    localStorage.removeItem('mamba_auth_token');
                    sessionStorage.removeItem('mamba_auth_token');
                    window.location.replace('/');
                };
            } catch(e) {}
        }

        // 数据集时间范围选择器逻辑
        const selector = document.getElementById('dataset-selector');
        if (selector) {
            // 获取当前后端的数据集状态并同步到下拉框
            fetch('/api/get_dataset')
                .then(r => r.json())
                .then(data => {
                    if (data && data.dataset) {
                        selector.value = data.dataset;
                    }
                })
                .catch(e => console.log('非服务端环境，使用默认选择'));

            // 监听切换事件
            selector.addEventListener('change', function() {
                const newDataset = this.value;
                fetch('/api/set_dataset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dataset: newDataset })
                }).then(() => {
                    // 切换成功后刷新当前页面
                    window.location.reload();
                }).catch(e => {
                    console.error('切换数据源失败:', e);
                    window.location.reload();
                });
            });
        }
    });
</script>
</body>
</html>
